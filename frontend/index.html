<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Study Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Study Assistant</h1>
        <p>Upload your study notes and ask questions using AI.</p>

        <h2>Upload Notes</h2>

        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="fileInput" name="file" accept=".pdf,.txt,.docx" required>
            <br><br>
            <button type="submit">Upload File</button>
        </form>

        <div id="uploadResult"></div>

        <button id="clearNotesBtn" class="danger-button" type="button">
            Clear Notes
        </button>

        <div id="clearResult"></div>

        <hr>

<h2>Ask a Question</h2>

<form id="questionForm">
    <input type="text" id="questionInput" placeholder="Ask something about your notes" required>
    <br><br>
    <button type="submit">Search Notes</button>
</form>

<div id="searchResult"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
